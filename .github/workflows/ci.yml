name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install deps (runtime + dev)
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
          # Qt needs a display libs + a platform plugin available even
          # when we run headless. xvfb not strictly needed because tests
          # set QT_QPA_PLATFORM=offscreen, but having the plugin on disk is.
          sudo apt-get update -qq
          sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0

      - name: Ruff (lint)
        run: ruff check pymibbrowser/ tests/

      - name: mypy (type check)
        run: mypy pymibbrowser/

      - name: Bandit (security)
        run: bandit -q -c pyproject.toml -r pymibbrowser/

      - name: pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -v
