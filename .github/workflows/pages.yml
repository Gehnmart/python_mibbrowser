name: pages

# Publishes the docs/ folder to GitHub Pages on every push to main.
# Settings → Pages → Source = "GitHub Actions" must be enabled once
# per repo; after that, every push redeploys automatically.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Tokens the pages deployment uses.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialise runs — no point publishing an older commit if a newer
# one is already queued.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload docs/ as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
